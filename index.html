<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- bootStrap -->
    <link rel="stylesheet" href="style/bootstrap.min.css">
    <!-- Css Font Awesome -->
    <link rel="stylesheet" href="style/all.min.css">
    <!-- css -->
    <link rel="stylesheet" href="style/syle.css">
    <title>calculator</title>
</head>

<body>


    <div class="container p-4 w-25 ">
        <h1>calculator</h1>
        <div class="border border-secondary rounded-3 p-3 " style="min-height: 50vh;">
            <input type="text" class="w-100 form-control" disabled id="Result">
            <div class="row">
                <div class="col-6 row g-2" >
                    <div class="col-4">
                        <button class="btn btn-outline-secondary w-100" style="min-height:10vh;">1</button>
                    </div>
                    <div class="col-4">
                        <button class="btn btn-outline-secondary w-100" style="min-height:10vh;">2</button>
                    </div>
                    <div class="col-4">
                        <button class="btn btn-outline-secondary w-100" style="min-height:10vh;">3</button>
                    </div>
                    <div class="col-4">
                        <button class="btn btn-outline-secondary w-100" style="min-height:10vh;">4</button>
                    </div>
                    <div class="col-4">
                        <button class="btn btn-outline-secondary w-100" style="min-height:10vh;">5</button>
                    </div>
                    <div class="col-4">
                        <button class="btn btn-outline-secondary w-100" style="min-height:10vh;">6</button>
                    </div>
                    <div class="col-4">
                        <button class="btn btn-outline-secondary w-100" style="min-height:10vh;">7</button>
                    </div>
                    <div class="col-4">
                        <button class="btn btn-outline-secondary w-100" style="min-height:10vh;">8</button>
                    </div>
                    <div class="col-4">
                        <button class="btn btn-outline-secondary w-100" style="min-height:10vh;">9</button>
                    </div>
                    <div class="col-4">
                        <button class="btn btn-outline-secondary w-100" style="min-height:10vh;">.</button>
                    </div>
                    <div class="col-8">
                        <button class="btn btn-outline-secondary w-100" style="min-height:10vh;">0</button>
                    </div>
                  
                </div>
                <div class="col-6 row g-1 pt-2">
                    <div class="col-4">
                        <button class="btn btn-outline-secondary w-100" style="min-height:14vh; background-color: rgba(0, 128, 0, 0.514); color: white;">*</button>
                    </div>
                    <div class="col-4">
                        <button class="btn btn-outline-secondary w-100" style="min-height:14vh; background-color: rgba(13, 0, 128, 0.514); color: white;">/</button>
                    </div>
                    <div class="col-4">
                        <button class="btn btn-outline-secondary w-100" style="min-height:14vh; background-color: rgba(128, 87, 0, 0.514); color: white;">+</button>
                    </div>
                    <div class="col-4">
                        <button class="btn btn-outline-secondary w-100" style="min-height:14vh; background-color: rgba(128, 0, 85, 0.514); color: white;">-</button>
                    </div>
                    <div class="col-4">
                        <button class="btn btn-outline-secondary w-100" style="min-height:14vh; background-color: rgba(128, 0, 0, 0.514); color: white;">%</button>
                    </div>
                    <div class="col-4">
                        <button class="btn btn-outline-secondary w-100" style="min-height:14vh; background-color: rgba(255, 0, 0, 0.993); color: white;">Del</button>
                    </div>
                    <div class="col-4">
                        <button class="btn btn-outline-secondary w-100" style="min-height:14vh; background-color: rgba(9, 33, 139, 0.979); color: white;">*2</button>
                    </div>
                    <div class="col-8">
                        <button class="btn btn-outline-secondary w-100" style="min-height:14vh; background-color: rgba(255, 2, 213, 0.514); color: white;">=</button>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <!-- Font Awesome -->
    <script src="js/all.min.js"></script>
    <!-- Js  -->
    <script src="js/main.js"></script>
</body>

</html>
